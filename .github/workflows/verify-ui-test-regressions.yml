name: Verify UI test regressions

on:
  push:
    branches:
      - fix/ui-test-regressions

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CSharpFar.slnx

      - name: Run tests and record result
        shell: pwsh
        run: |
          dotnet test CSharpFar.slnx --configuration Release --no-restore --verbosity normal 2>&1 |
            Tee-Object -FilePath verification-result.txt
          $testExit = $LASTEXITCODE
          Add-Content verification-result.txt "`nEXIT_CODE=$testExit"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification-result.txt
          git commit -m "Record UI regression test result"
          git push
          exit 0
