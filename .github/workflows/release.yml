name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  attestations: write
  contents: write
  id-token: write

env:
  CHECKSUMS_NAME: SHA256SUMS.txt
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            project: src/CSharpFar.Host.Windows/CSharpFar.Host.Windows.csproj
            runtime: win-x64
            archive: zip
            binary: CSharpFar.exe
            asset: CSharpFar-${{ github.ref_name }}-win-x64.zip
          - os: ubuntu-latest
            project: src/CSharpFar.Host.Unix/CSharpFar.Host.Unix.csproj
            runtime: linux-x64
            archive: tar.gz
            binary: csharpfar
            asset: CSharpFar-${{ github.ref_name }}-linux-x64.tar.gz

    steps:
      - name: Validate version tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH format."
          }

          $version = $env:GITHUB_REF_NAME.Substring(1)
          "VERSION=$version" >> $env:GITHUB_ENV
          "ASSEMBLY_VERSION=$version.0" >> $env:GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CSharpFar.slnx

      - name: Build
        run: dotnet build CSharpFar.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CSharpFar.slnx --configuration Release --no-build --verbosity normal

      - name: Publish
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish-${{ matrix.runtime }}"
          "PUBLISH_DIR=$publishDir" >> $env:GITHUB_ENV

          dotnet publish "${{ matrix.project }}" `
            --configuration Release `
            --runtime "${{ matrix.runtime }}" `
            --self-contained true `
            --output $publishDir `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=$env:VERSION `
            /p:AssemblyVersion=$env:ASSEMBLY_VERSION `
            /p:FileVersion=$env:ASSEMBLY_VERSION `
            /p:InformationalVersion=$env:GITHUB_REF_NAME

      - name: Verify publish output
        shell: pwsh
        run: |
          $binaryPath = Join-Path $env:PUBLISH_DIR "${{ matrix.binary }}"
          if (-not (Test-Path $binaryPath -PathType Leaf)) {
            throw "Expected '${{ matrix.binary }}' in publish output."
          }

          $debugSymbols = Get-ChildItem -Path $env:PUBLISH_DIR -Filter *.pdb -File -Recurse
          if ($debugSymbols) {
            $debugSymbolNames = $debugSymbols |
              ForEach-Object { Resolve-Path -Path $_.FullName -Relative }

            throw "Publish output must not contain .pdb files: $($debugSymbolNames -join ', ')"
          }

          if ("${{ matrix.runtime }}" -eq "linux-x64") {
            if (-not (Test-Path $binaryPath -PathType Leaf)) {
              throw "Linux binary is missing: $binaryPath"
            }

            chmod +x $binaryPath
            bash -c "test -x '$binaryPath'"
            if ($LASTEXITCODE -ne 0) {
              throw "Linux binary is not executable: $binaryPath"
            }
          }

          & $binaryPath --version
          if ($LASTEXITCODE -ne 0) {
            throw "--version failed for $binaryPath"
          }

          & $binaryPath --self-test
          if ($LASTEXITCODE -ne 0) {
            throw "--self-test failed for $binaryPath"
          }

      - name: Build Debian package
        if: matrix.runtime == 'linux-x64'
        shell: pwsh
        run: |
          $binaryPath = Join-Path $env:PUBLISH_DIR "csharpfar"
          ldd $binaryPath | Out-Host

          $debPath = ./eng/packaging/build-deb.ps1 `
            -PublishDir $env:PUBLISH_DIR `
            -Version $env:VERSION `
            -PackageRevision "1" `
            -OutputDir $env:RUNNER_TEMP

          "DEB_PATH=$debPath" >> $env:GITHUB_ENV

          $debName = Split-Path -Path $debPath -Leaf
          $debHash = (Get-FileHash -Path $debPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$debHash  $debName" | Set-Content -Path "$debPath.sha256" -Encoding ascii

      - name: Package
        shell: pwsh
        run: |
          $assetPath = Join-Path $env:RUNNER_TEMP "${{ matrix.asset }}"
          if (Test-Path $assetPath) {
            Remove-Item $assetPath
          }

          if ("${{ matrix.archive }}" -eq "zip") {
            Compress-Archive -Path (Join-Path $env:PUBLISH_DIR "*") -DestinationPath $assetPath -CompressionLevel Optimal
          }
          else {
            tar -czf $assetPath -C $env:PUBLISH_DIR .
          }

          $assetHash = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$assetHash  ${{ matrix.asset }}" | Set-Content -Path (Join-Path $env:RUNNER_TEMP "${{ matrix.asset }}.sha256") -Encoding ascii
          "ASSET_PATH=$assetPath" >> $env:GITHUB_ENV

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: Upload checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.sha256
          path: ${{ runner.temp }}/${{ matrix.asset }}.sha256
          if-no-files-found: error

      - name: Upload Debian package artifact
        if: matrix.runtime == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: csharpfar-deb
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error

      - name: Upload Debian checksum fragment
        if: matrix.runtime == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: csharpfar-deb.sha256
          path: ${{ env.DEB_PATH }}.sha256
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.ASSET_PATH }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release

      - name: Prepare release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:RUNNER_TEMP "release"
          $assetsDir = Join-Path $env:RUNNER_TEMP "assets"
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          Get-ChildItem -Path $releaseDir -File -Recurse |
            Where-Object { $_.Name -notlike "*.sha256" } |
            Copy-Item -Destination $assetsDir

          $checksumLines = Get-ChildItem -Path $releaseDir -Filter "*.sha256" -File -Recurse |
            Sort-Object Name |
            ForEach-Object { Get-Content -Raw $_.FullName }

          $checksumsPath = Join-Path $assetsDir $env:CHECKSUMS_NAME
          $checksumLines | Set-Content -Path $checksumsPath -Encoding ascii

          "ASSETS_DIR=$assetsDir" >> $env:GITHUB_ENV
          "CHECKSUMS_PATH=$checksumsPath" >> $env:GITHUB_ENV

      - name: Generate release notes
        shell: pwsh
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $previousTag = git tag --list "v*.*.*" --sort=-v:refname |
            Where-Object { $_ -ne $env:GITHUB_REF_NAME } |
            Select-Object -First 1

          if ($previousTag) {
            $changeRange = "$previousTag..$env:GITHUB_REF_NAME"
            $changesHeading = "### Changes since $previousTag"
            $changes = @(git log $changeRange --no-merges --pretty=format:"- %s (%h)")
          }
          else {
            $changesHeading = "### Changes"
            $changes = @(git log $env:GITHUB_REF_NAME --no-merges --pretty=format:"- %s (%h)")
          }

          if ($changes.Count -eq 0) {
            $changes = @("- No commit summary available.")
          }

          $windowsAsset = "CSharpFar-$env:GITHUB_REF_NAME-win-x64.zip"
          $linuxAsset = "CSharpFar-$env:GITHUB_REF_NAME-linux-x64.tar.gz"
          $debianAsset = "csharpfar_$($env:GITHUB_REF_NAME.Substring(1))-1_amd64.deb"
          $notes = @(
            "## CSharpFar $env:GITHUB_REF_NAME",
            "",
            "Experimental Windows x64 and Linux x64 builds.",
            "",
            "### Download",
            "- Windows: download ``$windowsAsset``, unpack it and run ``CSharpFar.exe``.",
            "- Debian/Ubuntu: download ``$debianAsset`` and install it with ``sudo apt install ./$debianAsset``.",
            "- Portable Linux: download ``$linuxAsset``, unpack it and run ``csharpfar``.",
            "",
            "### Install on Ubuntu/Debian",
            "``````bash",
            "curl -fsSL https://dimonsmart.github.io/CSharpFar/install.sh | sh",
            "``````",
            "",
            "Currently the APT package is published for amd64 only.",
            "",
            "Verify:",
            "",
            "``````bash",
            "csharpfar --version",
            "``````",
            "",
            "Run diagnostics if needed:",
            "",
            "``````bash",
            "csharpfar --self-test",
            "``````",
            "",
            "### Manual APT installation",
            "``````bash",
            "sudo install -m 0755 -d /etc/apt/keyrings",
            "curl -fsSL https://dimonsmart.github.io/CSharpFar/apt/csharpfar-archive-keyring.gpg | sudo tee /etc/apt/keyrings/csharpfar.gpg > /dev/null",
            "echo `"deb [arch=`$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/csharpfar.gpg] https://dimonsmart.github.io/CSharpFar/apt stable main`" | sudo tee /etc/apt/sources.list.d/csharpfar.list > /dev/null",
            "sudo apt update",
            "sudo apt install csharpfar",
            "``````",
            "",
            "### Verification",
            "Download ``$env:CHECKSUMS_NAME`` and compare archive hashes:",
            "",
            "``````bash",
            "sha256sum -c $env:CHECKSUMS_NAME",
            "``````",
            "",
            $changesHeading,
            $changes,
            "",
            "### Notes",
            "- Early development build.",
            "- Windows executable is not code-signed yet, so Windows SmartScreen may show a warning."
          )

          $notes | Set-Content -Path $notesPath -Encoding utf8
          "RELEASE_NOTES_PATH=$notesPath" >> $env:GITHUB_ENV

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -Path $env:ASSETS_DIR -File |
            ForEach-Object { $_.FullName }

          gh release create $env:GITHUB_REF_NAME $assets `
            --verify-tag `
            --title "CSharpFar $env:GITHUB_REF_NAME" `
            --notes-file $env:RELEASE_NOTES_PATH
