name: Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CSharpFar.slnx

      - name: Build
        run: dotnet build CSharpFar.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CSharpFar.slnx --configuration Release --no-build --verbosity normal
