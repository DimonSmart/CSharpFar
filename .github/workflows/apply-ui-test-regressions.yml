name: Apply UI test regressions patch

on:
  push:
    branches:
      - fix/ui-test-regressions

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply targeted test updates
        run: python scripts/apply-ui-test-regressions.py

      - name: Commit updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/CSharpFar.Tests
          git commit -m "Fix UI test regressions after focus and rendering refactor"
          git push
